name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ssh-gateway
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ssh-gateway.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare package variables
        shell: bash
        run: |
          PACKAGE="ssh-gateway-${GITHUB_REF_NAME}-${{ matrix.target }}"
          echo "PACKAGE=${PACKAGE}" >> "$GITHUB_ENV"
          echo "BIN_PATH=target/${{ matrix.target }}/release/${{ matrix.binary }}" >> "$GITHUB_ENV"

      - name: Stage package contents
        shell: bash
        run: |
          mkdir -p "dist/${PACKAGE}/examples"
          cp "${BIN_PATH}" "dist/${PACKAGE}/"
          cp README.md README.zh-CN.md LICENSE "dist/${PACKAGE}/"
          cp examples/profiles.yaml "dist/${PACKAGE}/examples/"

      - name: Archive package (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C dist -czf "dist/${PACKAGE}.tar.gz" "${PACKAGE}"

      - name: Archive package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/$env:PACKAGE/*" -DestinationPath "dist/$env:PACKAGE.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.zip *.tar.gz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS
