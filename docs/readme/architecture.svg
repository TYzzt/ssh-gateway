<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">ssh-gateway architecture</title>
  <desc id="archDesc">Architecture diagram showing an agent request flowing through CLI and daemon into embedded SSH sessions, bastions, delegated via_profile, and the final target.</desc>
  <defs>
    <linearGradient id="archBg" x1="82" y1="70" x2="1186" y2="684" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFD"/>
      <stop offset="1" stop-color="#EEF4F7"/>
    </linearGradient>
    <linearGradient id="tealCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0E2A36"/>
      <stop offset="1" stop-color="#12384A"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#archBg)"/>
  <rect x="44" y="44" width="1192" height="672" rx="24" stroke="#C9D8E2" stroke-width="1.5"/>

  <text x="88" y="118" fill="#0F3041" font-size="36" font-weight="700" font-family="'Aptos Display', 'Segoe UI', sans-serif">Profile-driven transport</text>
  <text x="88" y="154" fill="#547286" font-size="20" font-family="'Aptos', 'Segoe UI', sans-serif">One daemon, reused embedded SSH sessions, optional delegated hops.</text>

  <rect x="88" y="214" width="228" height="122" rx="22" fill="url(#tealCard)"/>
  <text x="122" y="255" fill="#85EFD0" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">1. Agent request</text>
  <text x="122" y="286" fill="#F5F7FA" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">`exec --profile target -- hostname`</text>
  <text x="122" y="316" fill="#B4D0E0" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">Only the profile name crosses the API boundary.</text>

  <rect x="374" y="214" width="232" height="122" rx="22" fill="#FFFFFF" stroke="#BCD2DF" stroke-width="2"/>
  <text x="406" y="255" fill="#1E495F" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">2. Local daemon</text>
  <text x="406" y="286" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">Loads config, owns secrets,</text>
  <text x="406" y="312" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">manages session reuse.</text>

  <rect x="664" y="214" width="248" height="122" rx="22" fill="#FFFFFF" stroke="#BCD2DF" stroke-width="2"/>
  <text x="696" y="255" fill="#1E495F" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">3. Embedded SSH</text>
  <text x="696" y="286" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">Direct transport uses russh,</text>
  <text x="696" y="312" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">reused channels, direct-tcpip hops.</text>

  <rect x="970" y="190" width="212" height="78" rx="18" fill="#16351D"/>
  <text x="1002" y="223" fill="#D0F18E" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Bastion A</text>
  <text x="1002" y="249" fill="#A4C0B1" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">key or password</text>

  <rect x="970" y="286" width="212" height="78" rx="18" fill="#17342D"/>
  <text x="1002" y="319" fill="#89F0C9" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Bastion B</text>
  <text x="1002" y="345" fill="#A4C0B1" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">optional additional hop</text>

  <rect x="970" y="382" width="212" height="94" rx="18" fill="#3A291B"/>
  <text x="1002" y="417" fill="#F5CF90" font-size="18" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Target host</text>
  <text x="1002" y="443" fill="#E5CBA5" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">exec / read / write / transfer</text>
  <text x="1002" y="467" fill="#E5CBA5" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">managed remote agent</text>

  <rect x="88" y="454" width="518" height="184" rx="24" fill="#FFFFFF" stroke="#BCD2DF" stroke-width="2"/>
  <text x="120" y="500" fill="#1E495F" font-size="20" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Delegated `via_profile` path</text>
  <text x="120" y="538" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">When the final target is only reachable from an upstream host,</text>
  <text x="120" y="564" fill="#406378" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">the daemon reuses that upstream profile and runs `ssh target ...` remotely.</text>

  <rect x="120" y="590" width="190" height="28" rx="14" fill="#D9F7EE"/>
  <text x="142" y="609" fill="#1C6152" font-size="13" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">No extra local target credential</text>
  <rect x="328" y="590" width="136" height="28" rx="14" fill="#FCE9C8"/>
  <text x="351" y="609" fill="#7A5720" font-size="13" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">No tunnel open</text>

  <rect x="704" y="504" width="478" height="134" rx="24" fill="#0F2130"/>
  <text x="740" y="548" fill="#85EFD0" font-size="20" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Session metadata</text>
  <text x="740" y="584" fill="#DCE7EF" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">`transport = embedded_ssh`</text>
  <text x="740" y="610" fill="#DCE7EF" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">`reused = true`, plus delegated target and upstream profile when relevant</text>

  <path d="M316 275H374" stroke="#7390A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M606 275H664" stroke="#7390A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M912 275H970" stroke="#7390A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M1076 268V286" stroke="#7390A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M1076 364V382" stroke="#7390A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M606 550H704" stroke="#7390A3" stroke-width="3" stroke-dasharray="10 10" stroke-linecap="round"/>
  <path d="M346 336V454" stroke="#7390A3" stroke-width="3" stroke-dasharray="10 10" stroke-linecap="round"/>

  <circle cx="374" cy="275" r="6" fill="#7390A3"/>
  <circle cx="664" cy="275" r="6" fill="#7390A3"/>
  <circle cx="970" cy="275" r="6" fill="#7390A3"/>
</svg>
