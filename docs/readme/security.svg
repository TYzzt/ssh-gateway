<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="securityTitle securityDesc">
  <title id="securityTitle">ssh-gateway security boundary</title>
  <desc id="securityDesc">Security diagram showing that secrets stay in config and daemon boundaries while agents use profile names and receive redacted summaries.</desc>
  <defs>
    <linearGradient id="secBg" x1="74" y1="60" x2="1194" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBF7"/>
      <stop offset="1" stop-color="#F8F4ED"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#secBg)"/>
  <rect x="44" y="44" width="1192" height="672" rx="24" stroke="#D9E1D7" stroke-width="1.5"/>

  <text x="88" y="118" fill="#163B32" font-size="36" font-weight="700" font-family="'Aptos Display', 'Segoe UI', sans-serif">API-boundary secret isolation</text>
  <text x="88" y="154" fill="#5B746C" font-size="20" font-family="'Aptos', 'Segoe UI', sans-serif">The caller sees profiles and redacted summaries; the daemon owns config-backed secrets.</text>

  <rect x="88" y="206" width="282" height="164" rx="24" fill="#0F2130"/>
  <text x="124" y="252" fill="#91F0D4" font-size="22" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Agent / caller</text>
  <text x="124" y="292" fill="#DCE7EF" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">Sends:</text>
  <text x="124" y="322" fill="#DCE7EF" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">- profile name</text>
  <text x="124" y="348" fill="#DCE7EF" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">- command / path / tunnel args</text>

  <rect x="440" y="174" width="404" height="258" rx="28" fill="#FFFFFF" stroke="#BFD4C8" stroke-width="2"/>
  <rect x="476" y="216" width="332" height="58" rx="18" fill="#DFF7EE"/>
  <text x="508" y="253" fill="#1D6656" font-size="20" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Gateway daemon</text>
  <text x="508" y="292" fill="#446B60" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">Reads config, opens SSH sessions, redacts summaries,</text>
  <text x="508" y="318" fill="#446B60" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">and keeps passwords inside the local process boundary.</text>

  <rect x="484" y="344" width="150" height="54" rx="16" fill="#142837"/>
  <text x="512" y="377" fill="#9BD6FF" font-size="16" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">CLI / RPC</text>

  <rect x="650" y="344" width="150" height="54" rx="16" fill="#172B1B"/>
  <text x="676" y="377" fill="#CBED8C" font-size="16" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">SSH transport</text>

  <rect x="910" y="206" width="282" height="164" rx="24" fill="#3A291B"/>
  <text x="946" y="252" fill="#F7D79E" font-size="22" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Config + secrets</text>
  <text x="946" y="292" fill="#E6D2B0" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">Contains:</text>
  <text x="946" y="322" fill="#E6D2B0" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">- passwords</text>
  <text x="946" y="348" fill="#E6D2B0" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif">- private-key paths</text>

  <rect x="88" y="470" width="1104" height="176" rx="26" fill="#FFFFFF" stroke="#BFD4C8" stroke-width="2"/>
  <text x="124" y="516" fill="#163B32" font-size="22" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Returned to the caller</text>
  <rect x="124" y="548" width="264" height="56" rx="18" fill="#EAF4F8"/>
  <text x="154" y="582" fill="#2D546C" font-size="17" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">`profile show` redacts passwords</text>
  <rect x="408" y="548" width="318" height="56" rx="18" fill="#EAF4F8"/>
  <text x="438" y="582" fill="#2D546C" font-size="17" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">`session inspect` returns metadata only</text>
  <rect x="746" y="548" width="410" height="56" rx="18" fill="#EAF4F8"/>
  <text x="776" y="582" fill="#2D546C" font-size="17" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Errors avoid echoing raw passwords or key contents</text>

  <rect x="88" y="676" width="1104" height="28" rx="14" fill="#EAF7F2"/>
  <text x="452" y="695" fill="#2B6558" font-size="14" font-weight="700" font-family="'Aptos', 'Segoe UI', sans-serif">Boundary claim: safer agent API surface, not same-user local process isolation</text>

  <path d="M370 288H440" stroke="#7B978D" stroke-width="4" stroke-linecap="round"/>
  <path d="M844 288H910" stroke="#7B978D" stroke-width="4" stroke-linecap="round"/>
  <path d="M642 432V470" stroke="#7B978D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="440" cy="288" r="6" fill="#7B978D"/>
  <circle cx="910" cy="288" r="6" fill="#7B978D"/>
  <circle cx="642" cy="470" r="6" fill="#7B978D"/>
</svg>
