<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">SSH Gateway for Agents</title>
  <desc id="heroDesc">A technical product banner showing an agent request flowing through a daemon and embedded SSH sessions to bastions and targets.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="60" x2="1180" y2="658" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0F1E2D"/>
    </linearGradient>
    <linearGradient id="glow" x1="304" y1="196" x2="1026" y2="516" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1FD1A3" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F4B860" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#102638"/>
      <stop offset="1" stop-color="#0B1A28"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <rect x="52" y="52" width="1176" height="616" rx="24" stroke="#1F3B52" stroke-width="1.5"/>
  <rect x="280" y="154" width="740" height="412" rx="28" fill="url(#glow)"/>

  <g opacity="0.16">
    <path d="M116 120H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 184H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 248H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 312H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 376H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 440H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 504H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M116 568H1164" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M180 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M308 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M436 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M564 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M692 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M820 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M948 96V624" stroke="#A7C2D8" stroke-width="1"/>
    <path d="M1076 96V624" stroke="#A7C2D8" stroke-width="1"/>
  </g>

  <text x="110" y="154" fill="#79E7C3" font-size="16" font-family="'Aptos', 'Segoe UI', sans-serif" letter-spacing="0.2em">AGENT-READY REMOTE OPERATIONS</text>
  <text x="110" y="238" fill="#F5F7FA" font-size="66" font-weight="700" font-family="'Aptos Display', 'Segoe UI', sans-serif">SSH Gateway</text>
  <text x="110" y="308" fill="#F5F7FA" font-size="66" font-weight="700" font-family="'Aptos Display', 'Segoe UI', sans-serif">for Agents</text>
  <text x="110" y="368" fill="#A7C2D8" font-size="26" font-family="'Aptos', 'Segoe UI', sans-serif">Reusable embedded SSH sessions, bastion chains,</text>
  <text x="110" y="404" fill="#A7C2D8" font-size="26" font-family="'Aptos', 'Segoe UI', sans-serif">delegated hops, and profile-managed credentials.</text>

  <g>
    <rect x="110" y="470" width="210" height="46" rx="23" fill="#113A35"/>
    <text x="145" y="500" fill="#9CF2D6" font-size="18" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Secret isolation</text>
    <rect x="336" y="470" width="204" height="46" rx="23" fill="#1A3244"/>
    <text x="371" y="500" fill="#B7D5E6" font-size="18" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Reused sessions</text>
    <rect x="556" y="470" width="194" height="46" rx="23" fill="#3C2D1D"/>
    <text x="591" y="500" fill="#F4D39B" font-size="18" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Bastion chains</text>
    <rect x="766" y="470" width="162" height="46" rx="23" fill="#243047"/>
    <text x="801" y="500" fill="#D7E2F1" font-size="18" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">JSON CLI</text>
  </g>

  <g transform="translate(768 146)">
    <rect x="0" y="0" width="396" height="368" rx="24" fill="url(#card)" stroke="#264861" stroke-width="1.5"/>
    <text x="28" y="42" fill="#D7E2F1" font-size="20" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Flow</text>

    <rect x="28" y="70" width="152" height="78" rx="18" fill="#0B2430" stroke="#2A5967"/>
    <text x="50" y="101" fill="#79E7C3" font-size="16" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Agent request</text>
    <text x="50" y="127" fill="#A7C2D8" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">profile + command</text>

    <rect x="216" y="70" width="152" height="78" rx="18" fill="#101C2C" stroke="#3C5B81"/>
    <text x="238" y="101" fill="#8CC8FF" font-size="16" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Gateway daemon</text>
    <text x="238" y="127" fill="#A7C2D8" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">config + session pool</text>

    <rect x="28" y="194" width="152" height="78" rx="18" fill="#162415" stroke="#506F49"/>
    <text x="51" y="225" fill="#D0F18E" font-size="16" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Embedded SSH</text>
    <text x="51" y="251" fill="#A7C2D8" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">reused channels</text>

    <rect x="216" y="194" width="152" height="78" rx="18" fill="#2D2418" stroke="#8A6A3C"/>
    <text x="247" y="225" fill="#F4D39B" font-size="16" font-weight="600" font-family="'Aptos', 'Segoe UI', sans-serif">Bastions / target</text>
    <text x="247" y="251" fill="#A7C2D8" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">per-hop auth</text>

    <rect x="28" y="306" width="340" height="34" rx="17" fill="#121F2D"/>
    <text x="52" y="328" fill="#A7C2D8" font-size="14" font-family="'Aptos', 'Segoe UI', sans-serif">Agents never need to carry raw passwords in prompts.</text>

    <path d="M180 109H216" stroke="#5B7B94" stroke-width="2"/>
    <path d="M170 233H216" stroke="#5B7B94" stroke-width="2"/>
    <path d="M104 148V194" stroke="#5B7B94" stroke-width="2"/>
    <path d="M292 148V194" stroke="#5B7B94" stroke-width="2"/>
    <circle cx="212" cy="109" r="4" fill="#5B7B94"/>
    <circle cx="212" cy="233" r="4" fill="#5B7B94"/>
  </g>
</svg>
